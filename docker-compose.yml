services:
  db:
    image: postgres:15
    container_name: node_senior_db
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "user_db"
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test-db:
    image: postgres:15
    container_name: node_test_db
    environment:
      POSTGRES_USER: "testuser"
      POSTGRES_PASSWORD: "testpassword"
      POSTGRES_DB: "user_test_db"
    ports:
      - "6433:5432"

  redis:
    image: redis:7-alpine
    container_name: node_senior_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: {}
